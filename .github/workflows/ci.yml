name: CI
on:
  push:
    branches: [advanced]
jobs:
    frontend:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                node-version: '20'
                cache: npm  
                cache-dependency-path: frontend/package-lock.json 

            - name: Install packages using npm
              run: npm install --prefix frontend
            - name: Run Linter
              run: npm run lint
            - name: Run Tests
              run: npm test
    
